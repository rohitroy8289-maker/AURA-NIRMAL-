<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Nirmal - Luxury Candles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            color: #D4AF37;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .links {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }
        
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: #f0f0f0;
            color: #667eea;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .links a:hover {
            background: #667eea;
            color: white;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 5px;
            color: #2e7d32;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✨🕯️✨</div>
        <h1>Aura Nirmal</h1>
        <p>Luxury Handcrafted Candles</p>
        <p>Welcome! Your website is live and working perfectly.</p>
        
        <div class="status">
            ✅ Website is running successfully!
        </div>
        
        <div class="links">
            <h3>Available Pages:</h3>
            <a href="index.html">View Full Website</a>
            <a href="todo-index.html">Todo App</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 0.9em; color: #999;">
            If pages are loading, GitHub Pages is working! 🚀
        </p>
    </div>
</body>
</html>
